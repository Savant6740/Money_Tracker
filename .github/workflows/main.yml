name: Deploy React App to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Inject Password Secrets
        run: |
          sed -i "s/__PRAJAY_PWD_HASH_PLACEHOLDER__/${{ secrets.PRAJAY_PWD_HASH }}/g" src/App.js
          sed -i "s/__VAISHALI_PWD_HASH_PLACEHOLDER__/${{ secrets.VAISHALI_PWD_HASH }}/g" src/App.js

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Build App
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build
          branch: gh-pages
