name: Deploy React App to GitHub Pages

on:
  push:
    branches: [ main ] # or 'master', depending on your default branch

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Inject Password Secret
        # This searches your App.js file for the placeholder and swaps it with your secret hash
        run: |
          sed -i "s/__PRAJAY_PWD_HASH_PLACEHOLDER__/${{ secrets.PRAJAY_PWD_HASH }}/g" src/App.js

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Build App
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build # This is where React outputs the production build
          branch: gh-pages
